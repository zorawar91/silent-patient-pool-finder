version: "3.9"

services:
  db:
    image: postgres:16
    container_name: sppf_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sppf}
      POSTGRES_USER: ${POSTGRES_USER:-sppf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sppf_local}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/ingestion/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sppf_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@sppf.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
