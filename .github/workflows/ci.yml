name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pyarrow pyyaml scikit-learn requests \
                      streamlit plotly pytest

      - name: Compile all modules
        run: |
          python -m py_compile ingest_real_data.py ingest_zcta_data.py \
                               ingest_hcp_data.py fix_zip_map.py
          find src -name "*.py" -exec python -m py_compile {} +

      - name: Run test suite
        run: python -m pytest tests/ -q

      - name: Dashboard import check
        run: |
          python - <<'EOF'
          import ast, pathlib
          src = pathlib.Path("src/output/dashboard.py").read_text()
          ast.parse(src)
          print("dashboard.py parses OK")
          EOF
