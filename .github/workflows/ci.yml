name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Compile all modules
        run: find src -name "*.py" -exec python -m py_compile {} +

      - name: Run test suite
        run: python -m pytest tests/ -q

      # Proves the committed scores were produced by the committed code.
      # Catches the class of drift where the parquet and the scorer disagree
      # (e.g. a derived column silently missing or computed by older logic).
      - name: Verify data reproducibility
        run: python src/validation/verify_reproducible.py

      - name: Dashboard import check
        run: |
          python - <<'EOF'
          import ast, pathlib
          for p in pathlib.Path("src/output").rglob("*.py"):
              ast.parse(p.read_text())
          print("dashboard modules parse OK")
          EOF
