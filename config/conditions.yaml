# Condition definitions for the Silent Patient Pool Finder
# Each condition specifies the proxy signals used to detect undiagnosed patients.
# All ATC/NDC codes are illustrative — replace with real formulary codes for production.

conditions:
  t2d:
    name: "Type 2 Diabetes"
    short: "T2D"
    icd10_codes: ["E11", "E11.9", "E11.65"]
    # ICD-10 codes that signal KNOWN diagnosis (exclusion / denominator for Rx penetration)
    chronic_rx_codes: ["metformin", "glipizide", "sitagliptin", "empagliflozin", "insulin"]
    # OTC products whose co-purchase patterns proxy undiagnosed burden
    otc_proxy_products:
      - "blood_glucose_monitor"
      - "glucose_test_strips"
      - "dietary_supplement_chromium"
      - "dietary_supplement_berberine"
      - "sugar_free_products"
    # Lab tests that, when ordered WITHOUT follow-up chronic Rx, signal diagnostic orphans
    diagnostic_labs:
      - "HbA1c"
      - "fasting_glucose"
      - "oral_glucose_tolerance"
      - "random_blood_glucose"
    # Rx codes that suggest symptomatic visits but NOT diagnosis (e.g. treating complications)
    symptom_rx_codes: ["metformin_low_dose", "vitamin_b12", "gabapentin", "furosemide"]
    # Epidemiological prevalence prior for the US (NFHS/CDC equivalent)
    prevalence_prior_us: 0.113      # ~11.3% of US adults (CDC 2023)
    undiagnosed_fraction_us: 0.231  # ~23.1% of diabetics undiagnosed (CDC)
    # Lookback windows (days)
    orphan_followup_window_days: 90
    otc_lookback_days: 365

  htn:
    name: "Hypertension"
    short: "HTN"
    icd10_codes: ["I10", "I10.0", "I11", "I12", "I13"]
    chronic_rx_codes: ["lisinopril", "amlodipine", "losartan", "metoprolol", "hydrochlorothiazide"]
    otc_proxy_products:
      - "home_bp_monitor"
      - "bp_monitor_cuff"
      - "low_sodium_salt_substitute"
      - "potassium_supplement"
      - "magnesium_supplement"
      - "garlic_supplement"
      - "coq10_supplement"
    diagnostic_labs:
      - "basic_metabolic_panel"
      - "lipid_panel"
      - "urinalysis_protein"
      - "ekg_screening"
    symptom_rx_codes: ["aspirin_325mg", "ibuprofen_otc", "diuretic_otc", "pain_reliever"]
    prevalence_prior_us: 0.470      # ~47% of US adults (AHA 2023)
    undiagnosed_fraction_us: 0.270  # ~27% undiagnosed or untreated (AHA)
    orphan_followup_window_days: 90
    otc_lookback_days: 365

  hyperthyroidism:
    name: "Hypothyroidism"
    short: "HYP"
    # Hypothyroidism (underactive thyroid) — treated primarily with levothyroxine.
    # Includes Hashimoto's autoimmune thyroiditis (E06.3), the most common cause in the US.
    icd10_codes: ["E03", "E03.9", "E06.3", "E89.0"]
    # E03 = Other hypothyroidism, E03.9 = unspecified, E06.3 = Hashimoto's, E89.0 = post-procedural
    chronic_rx_codes: ["levothyroxine", "liothyronine", "desiccated_thyroid_extract"]
    # Levothyroxine is one of the most prescribed drugs in the US — strong Rx signal
    otc_proxy_products:
      - "selenium_supplement"       # Hashimoto's / thyroid support
      - "iodine_supplement"         # thyroid function support
      - "biotin_supplement"         # hair loss is a hallmark hypothyroid symptom
      - "hair_thickness_supplement" # targets hair thinning from hypothyroidism
      - "energy_supplement"         # fatigue is the most common presenting symptom
      - "ashwagandha_supplement"    # adaptogens marketed for thyroid/fatigue
      - "sleep_aid_otc"             # sleep disruption from hypothyroidism
    diagnostic_labs:
      - "TSH"                   # primary screening test (elevated in hypothyroidism)
      - "free_T4"               # confirmatory
      - "TPO_antibodies"        # detects Hashimoto's autoimmune cause
      - "thyroglobulin_antibodies"  # secondary autoimmune marker
    # Symptom_rx = drugs treating symptoms of untreated hypothyroidism without addressing root cause
    symptom_rx_codes: ["antidepressants", "statins", "iron_supplement", "laxatives"]
    # Hypothyroidism causes depression (→ antidepressants), high LDL (→ statins),
    # anemia (→ iron), and constipation (→ laxatives) — all proxy signals for undiagnosed cases
    prevalence_prior_us: 0.046      # ~4.6% of US adults (NHANES/ATA; incl. subclinical)
    undiagnosed_fraction_us: 0.300  # ~30% undiagnosed or untreated (ATA/JCEM estimates)
    orphan_followup_window_days: 90
    otc_lookback_days: 365
