# Condition definitions for the Silent Patient Pool Finder
# Each condition specifies the proxy signals used to detect undiagnosed patients.
# All ATC/NDC codes are illustrative — replace with real formulary codes for production.

conditions:
  t2d:
    name: "Type 2 Diabetes"
    short: "T2D"
    icd10_codes: ["E11", "E11.9", "E11.65"]
    # ICD-10 codes that signal KNOWN diagnosis (exclusion / denominator for Rx penetration)
    chronic_rx_codes: ["metformin", "glipizide", "sitagliptin", "empagliflozin", "insulin"]
    # OTC products whose co-purchase patterns proxy undiagnosed burden
    otc_proxy_products:
      - "blood_glucose_monitor"
      - "glucose_test_strips"
      - "dietary_supplement_chromium"
      - "dietary_supplement_berberine"
      - "sugar_free_products"
    # Lab tests that, when ordered WITHOUT follow-up chronic Rx, signal diagnostic orphans
    diagnostic_labs:
      - "HbA1c"
      - "fasting_glucose"
      - "oral_glucose_tolerance"
      - "random_blood_glucose"
    # Rx codes that suggest symptomatic visits but NOT diagnosis (e.g. treating complications)
    symptom_rx_codes: ["metformin_low_dose", "vitamin_b12", "gabapentin", "furosemide"]
    # Epidemiological prevalence prior for the US (NFHS/CDC equivalent)
    prevalence_prior_us: 0.113      # ~11.3% of US adults (CDC 2023)
    undiagnosed_fraction_us: 0.231  # ~23.1% of diabetics undiagnosed (CDC)
    # Lookback windows (days)
    orphan_followup_window_days: 90
    otc_lookback_days: 365

  htn:
    name: "Hypertension"
    short: "HTN"
    icd10_codes: ["I10", "I10.0", "I11", "I12", "I13"]
    chronic_rx_codes: ["lisinopril", "amlodipine", "losartan", "metoprolol", "hydrochlorothiazide"]
    otc_proxy_products:
      - "home_bp_monitor"
      - "bp_monitor_cuff"
      - "low_sodium_salt_substitute"
      - "potassium_supplement"
      - "magnesium_supplement"
      - "garlic_supplement"
      - "coq10_supplement"
    diagnostic_labs:
      - "basic_metabolic_panel"
      - "lipid_panel"
      - "urinalysis_protein"
      - "ekg_screening"
    symptom_rx_codes: ["aspirin_325mg", "ibuprofen_otc", "diuretic_otc", "pain_reliever"]
    prevalence_prior_us: 0.470      # ~47% of US adults (AHA 2023)
    undiagnosed_fraction_us: 0.270  # ~27% undiagnosed or untreated (AHA)
    orphan_followup_window_days: 90
    otc_lookback_days: 365

  hyperthyroidism:
    name: "Hyperthyroidism"
    short: "HYP"
    icd10_codes: ["E05", "E05.0", "E05.1", "E05.9", "E06.3"]
    chronic_rx_codes: ["levothyroxine", "methimazole", "propylthiouracil", "propranolol_thyroid"]
    otc_proxy_products:
      - "iodine_supplement"
      - "selenium_supplement"
      - "ashwagandha_supplement"
      - "heart_rate_monitor"
      - "anti_anxiety_supplement"
      - "sleep_aid_otc"
    diagnostic_labs:
      - "TSH"
      - "free_T4"
      - "free_T3"
      - "thyroid_antibodies"
      - "radioactive_iodine_uptake"
    symptom_rx_codes: ["propranolol_low_dose", "atenolol", "lorazepam", "zolpidem"]
    prevalence_prior_us: 0.013      # ~1.3% of US adults (ATA)
    undiagnosed_fraction_us: 0.500  # ~50% undiagnosed (estimates vary widely)
    orphan_followup_window_days: 60
    otc_lookback_days: 365
